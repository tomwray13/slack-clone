version: '3.8'

services:
  test_nestjs_postgres:
    image: postgres:alpine
    container_name: test_nestjs_postgres
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env.test
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5444:5432' # Different port to avoid conflict with the development environment
    volumes:
      - test_nestjs_postgres:/var/lib/postgresql/data

  test_nestjs_redis:
    image: redis:alpine
    container_name: test_nestjs_redis
    ports:
      - '6380:6379' # Different port to avoid conflict with the development environment
    volumes:
      - test_nestjs_redis:/data

networks:
  default:
    name: nestjs_starter_test

volumes:
  test_nestjs_postgres: # Needs to be the same as the volume name in the postgres service
  test_nestjs_redis: # Needs to be the same as the volume name in the redis service
